<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Productivity System - Hyderabad 22. Your Master Timetable with weekday schedule, evening rotation, weekend tasks, and key rules." />
    <meta name="theme-color" content="#FBF5EC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TTL" />
    <title>Lifeboard — Personal OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #FBF5EC; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; }
    button:hover { opacity: 0.9; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DDD0BE; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #C8B8A2; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    @keyframes stk-wiggle {
      0%, 100% { transform: rotate(-6deg); }
      50% { transform: rotate(8deg); }
    }
    @keyframes pop {
      0%   { transform: scale(0.88); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    @keyframes toast-in {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to   { transform: translate(-50%, 0); opacity: 1; }
    }
    @keyframes slide-up {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .pop-in { animation: pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .slide-up { animation: slide-up 0.22s ease both; }
  </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #FBF5EC;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
